<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — EduPrime</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root { --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d; --text:#e6edf3; --text2:#8b949e; --accent:#f0883e; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-wrap { display:flex; width:100%; max-width:900px; min-height:520px; border-radius:20px; overflow:hidden; border:1px solid var(--border); box-shadow:0 24px 80px rgba(0,0,0,.6); }
  .login-art {
    flex:1; background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 50%, #1a1208 100%);
    display:flex; flex-direction:column; justify-content:center; padding:48px;
    position:relative; overflow:hidden;
  }
  .login-art::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 20% 80%, rgba(240,136,62,.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(88,166,255,.08) 0%, transparent 50%);
  }
  .art-icon { font-size:52px; color:var(--accent); margin-bottom:24px; position:relative; }
  .art-title { font-size:32px; font-weight:800; line-height:1.2; position:relative; }
  .art-title span { color:var(--accent); }
  .art-sub { font-size:14px; color:var(--text2); margin-top:12px; line-height:1.7; position:relative; }
  .art-dots { position:absolute; right:40px; top:40px; display:flex; gap:8px; }
  .art-dots span { width:10px; height:10px; border-radius:50%; }
  .dot1 { background:var(--accent); }
  .dot2 { background:#58a6ff; }
  .dot3 { background:#3fb950; }

  .login-form-wrap { width:380px; background:var(--bg2); padding:48px 40px; display:flex; flex-direction:column; justify-content:center; }
  .form-title { font-size:22px; font-weight:700; margin-bottom:6px; }
  .form-sub { font-size:13px; color:var(--text2); margin-bottom:32px; }
  .field { margin-bottom:20px; }
  .field label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); margin-bottom:7px; }
  .input-wrap { position:relative; }
  .input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:14px; }
  .form-input {
    width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px 12px 40px; color:var(--text); font-size:14px; font-family:'Sora',sans-serif;
    transition:border-color .2s, box-shadow .2s;
  }
  .form-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(240,136,62,.1); }
  .btn-login {
    width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:13px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Sora',sans-serif;
    transition:background .2s, transform .1s; margin-top:8px;
  }
  .btn-login:hover { background:#ffa657; transform:translateY(-1px); }
  .error-msg { background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3); color:#f85149; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
  .login-footer { margin-top:28px; text-align:center; font-size:12px; color:var(--text2); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-art">
    <div class="art-dots"><span class="dot1"></span><span class="dot2"></span><span class="dot3"></span></div>
    <div class="art-icon"><i class="fas fa-graduation-cap"></i></div>
    <div class="art-title">Edu<span>Prime</span><br>School System</div>
    <div class="art-sub">A complete primary school management platform — students, staff, fees, attendance, and more.</div>
  </div>
  <div class="login-form-wrap">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to your account to continue</div>
    {% if form.errors %}
    <div class="error-msg"><i class="fas fa-exclamation-circle"></i> Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input class="form-input" type="text" name="username" placeholder="Enter your username" autofocus>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input class="form-input" type="password" name="password" placeholder="Enter your password">
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>
    <div class="login-footer">EduPrime School Management System</div>
  </div>
</div>
</body>
</html>
